services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shift_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI smog predictor (primary API) ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
    ports:
      - "8000:8000"
    # Uses Dockerfile CMD: uvicorn app.main:app

  # ── Django backend (auth + AQI CRUD) ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: local-dev-secret-key-change-in-production
      DEBUG: "True"
      POSTGRES_DB: shift_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGHOST: db
      PGPORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8001
               --workers 2
               --threads 2
               --timeout 120
               --access-logfile -
               --error-logfile -"

  # ── Next.js frontend ───────────────────────────────────────────────────────
  # Frontend деплоится на Vercel — здесь не нужен.

volumes:
  postgres_data:
